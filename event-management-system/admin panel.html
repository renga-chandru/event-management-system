<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #ffebd9, #ffffff); /* Christmas-themed background */
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        .admin-panel {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            z-index: 1;
            position: relative;
        }
        .admin-panel h1 {
            margin-bottom: 20px;
            font-size: 2rem;
            color: #d32f2f; /* Christmas Red */
            font-weight: bold;
        }
        .button {
            margin: 10px;
            padding: 12px 25px;
            background: #388e3c; /* Christmas Green */
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
        }
        .button:hover {
            background: #66bb6a; /* Lighter Green */
            transform: scale(1.1);
        }
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .floating-elements span {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            animation: bubble-up 10s infinite ease-in-out;
        }
        .floating-elements .bubble {
            width: 25px;
            height: 25px;
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        /* Animation for multicolor bubble */
        .floating-elements .bubble:nth-child(1) {
            background: rgba(255, 99, 132, 0.7); /* Red */
        }
        .floating-elements .bubble:nth-child(2) {
            background: rgba(54, 162, 235, 0.7); /* Blue */
        }
        .floating-elements .bubble:nth-child(3) {
            background: rgba(255, 159, 64, 0.7); /* Orange */
        }
        .floating-elements .bubble:nth-child(4) {
            background: rgba(75, 192, 192, 0.7); /* Teal */
        }
        .floating-elements .bubble:nth-child(5) {
            background: rgba(153, 102, 255, 0.7); /* Purple */
        }
        .floating-elements .bubble:nth-child(6) {
            background: rgba(255, 205, 86, 0.7); /* Yellow */
        }
        .floating-elements .bubble:nth-child(7) {
            background: rgba(255, 99, 132, 0.7); /* Red */
        }
        .floating-elements .bubble:nth-child(8) {
            background: rgba(54, 162, 235, 0.7); /* Blue */
        }
        .floating-elements span:nth-child(1) { left: 10%; animation-delay: 0s; }
        .floating-elements span:nth-child(2) { left: 20%; animation-delay: 2s; }
        .floating-elements span:nth-child(3) { left: 30%; animation-delay: 4s; }
        .floating-elements span:nth-child(4) { left: 40%; animation-delay: 6s; }
        .floating-elements span:nth-child(5) { left: 50%; animation-delay: 8s; }
        .floating-elements span:nth-child(6) { left: 60%; animation-delay: 10s; }
        .floating-elements span:nth-child(7) { left: 70%; animation-delay: 12s; }
        .floating-elements span:nth-child(8) { left: 80%; animation-delay: 14s; }

        @keyframes bubble-up {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            50% {
                transform: translateY(-400px) scale(1.2);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-800px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h1>Christmas Admin Panel</h1>
        <button class="button" onclick="window.location.href='uploads.html'">Manage Uploads</button>
        <button class="button" onclick="window.location.href='bookings.html'">View Bookings</button>
        <button class="button" onclick="window.location.href='feedback.html'">Feedback</button>
    </div>
    <div class="floating-elements">
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
    </div>
</body>
</html>
