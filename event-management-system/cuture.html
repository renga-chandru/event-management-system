<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        /* General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding-top: 50px;
        }

        .heading {
            font-size: 36px;
            color: #2d3e50;
            margin-bottom: 50px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .culture-button {
            font-size: 18px;
            padding: 15px 25px;
            border: none;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border-radius: 10px;
            transition: background-color 0.3s ease, transform 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .culture-button:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        .tamil {
            background-color: #ff6347; /* Tomato */
        }

        .kerala {
            background-color: #2e8b57; /* Sea Green */
        }

        .andra {
            background-color: #ff8c00; /* Dark Orange */
        }

        /* Christmas Animation */
        .snowflakes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .snowflake {
            position: absolute;
            top: -10px;
            font-size: 24px;
            color: rgb(88, 202, 247);
            user-select: none;
            animation: snow 10s linear infinite;
        }

        .snowflake:nth-child(1) {
            left: 10%;
            animation-duration: 8s;
        }

        .snowflake:nth-child(2) {
            left: 20%;
            animation-duration: 7s;
        }

        .snowflake:nth-child(3) {
            left: 30%;
            animation-duration: 10s;
        }

        .snowflake:nth-child(4) {
            left: 40%;
            animation-duration: 9s;
        }

        .snowflake:nth-child(5) {
            left: 50%;
            animation-duration: 8s;
        }

        .snowflake:nth-child(6) {
            left: 60%;
            animation-duration: 7s;
        }

        .snowflake:nth-child(7) {
            left: 70%;
            animation-duration: 10s;
        }

        @keyframes snow {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="heading">Admin Panel</h1>
        <div class="buttons">
            <button class="culture-button tamil">Tamil Culture Booking</button>
            <button class="culture-button kerala">Kerala Culture Booking</button>
            <button class="culture-button andra">Andhra Style Booking</button>
        </div>
    </div>

    <div class="snowflakes" aria-hidden="true">
        <div class="snowflake">❄</div>
        <div class="snowflake">❄</div>
        <div class="snowflake">❄</div>
        <div class="snowflake">❄</div>
        <div class="snowflake">❄</div>
        <div class="snowflake">❄</div>
        <div class="snowflake">❄</div>
    </div>
</body>
</html>
