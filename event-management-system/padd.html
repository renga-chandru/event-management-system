<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Product</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        .form-container {
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }

        .form-container h1 {
            margin-bottom: 20px;
        }

        .form-container input[type="text"],
        .form-container input[type="number"],
        .form-container input[type="file"],
        .form-container select,
        .form-container button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .form-container button {
            background-color: #5cb85c;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        .form-container button:hover {
            background-color: #4cae4c;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Upload Product</h1>
        <form action="padd.php" method="post" enctype="multipart/form-data">
            <label for="proname">Product Name:</label>
            <input type="text" id="proname" name="proname" placeholder="Enter product name" required>

            <label for="proprice">Product Price:</label>
            <input type="number" id="proprice" name="proprice" placeholder="Enter product price" required>

            <label for="file">Product Image:</label>
            <input type="file" id="file" name="file" accept="image/*" required>

            <label for="table">Select Table:</label>
            <select id="table" name="table" required>
                <option value="events">Events</option>
                <option value="korea">korea</option>
                <!-- Add more table options here if needed -->
            </select>

            <button type="submit">Upload Product</button>
        </form>
    </div>
</body>
</html>
